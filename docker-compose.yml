# WAAEM | واءم — full stack: PostgreSQL + Ollama (Llama) + FastAPI + Next.js
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waaem
      POSTGRES_PASSWORD: waaem
      POSTGRES_DB: waaem
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waaem"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Meta Llama via Ollama. After first boot, pull the model:
  #   docker compose exec ollama ollama pull llama3.1
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://waaem:waaem@db:5432/waaem
      OLLAMA_HOST: http://ollama:11434
      LLAMA_MODEL: llama3.1
      AI_ALLOW_FALLBACK: "true"
      CORS_ORIGINS: "*"
      UPLOAD_DIR: /app/uploads
      KB_DIR: /app/knowledge_base
      CHROMA_DIR: /app/knowledge_base/chroma
      KB_AUTO_BUILD: "true"           # ingest official Saudi regulations on first boot
      KB_UPDATE_INTERVAL_HOURS: "168" # weekly auto-update
    volumes:
      - uploads:/app/uploads
      - knowledge_base:/app/knowledge_base
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  ollama:
  uploads:
  knowledge_base:
