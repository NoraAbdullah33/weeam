# Render blueprint — WAAEM backend + PostgreSQL
# (Frontend deploys to Vercel — see frontend/vercel.json and DEPLOYMENT.md.)
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
databases:
  - name: waaem-db
    plan: free
    databaseName: waaem
    user: waaem

services:
  # --- Backend: FastAPI + async SQLAlchemy ---
  - type: web
    name: waaem-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: waaem-db
          property: connectionString
      # Render provides postgres://…; the app converts it to asyncpg at runtime.
      - key: OLLAMA_HOST
        sync: false          # set to your hosted Ollama/llama endpoint (optional)
      - key: LLAMA_MODEL
        value: llama3.1
      - key: AI_ALLOW_FALLBACK
        value: "true"
      - key: CORS_ORIGINS
        value: "*"          # tighten to your Vercel domain in production
